<!DOCTYPE html> 
 <html lang="zh"> 
 <head> 
   <meta charset="UTF-8"> 
   <title>电子宠物</title> 
   <style> 
     body { font-family: Arial; text-align: center; background: #f0f8ff; } 
     #pet { font-size: 80px; margin: 20px; } 
     .status { margin: 10px; } 
     button { margin: 5px; padding: 10px 15px; border-radius: 10px; border: none; cursor: pointer; } 
     .bar { width: 200px; height: 20px; background: #ddd; margin: 5px auto; border-radius: 10px; overflow: hidden; } 
     .fill { height: 100%; background: #4caf50; } 
   </style> 
 </head> 
 <body> 
 
 <h1>我的电子宠物 🐶</h1> 
 <div id="pet">🐶</div> 
 
 <div class="status"> 
   饥饿值 
   <div class="bar"><div id="hungerBar" class="fill"></div></div> 
 </div> 
 
 <div class="status"> 
   清洁度 
   <div class="bar"><div id="cleanBar" class="fill"></div></div> 
 </div> 
 
 <div class="status"> 
   心情 
   <div class="bar"><div id="moodBar" class="fill"></div></div> 
 </div> 
 
 <div> 
   <button onclick="feed()">喂食 🍖</button> 
   <button onclick="clean()">洗澡 🛁</button> 
   <button onclick="play()">玩耍 🎾</button> 
 </div> 
 
 <script> 
 let hunger = 80; 
 let cleanLevel = 80; 
 let mood = 80; 
 
 function updateUI() { 
   document.getElementById('hungerBar').style.width = hunger + '%'; 
   document.getElementById('cleanBar').style.width = cleanLevel + '%'; 
   document.getElementById('moodBar').style.width = mood + '%'; 
 
   let pet = document.getElementById('pet'); 
 
   if (hunger < 30) pet.textContent = '😢'; 
   else if (mood > 70) pet.textContent = '😄'; 
   else pet.textContent = '🐶'; 
 } 
 
 function feed() { 
   hunger = Math.min(100, hunger + 20); 
   mood = Math.min(100, mood + 5); 
   updateUI(); 
 } 
 
 function clean() { 
   cleanLevel = Math.min(100, cleanLevel + 30); 
   mood = Math.min(100, mood + 5); 
   updateUI(); 
 } 
 
 function play() { 
   mood = Math.min(100, mood + 20); 
   hunger = Math.max(0, hunger - 10); 
   updateUI(); 
 } 
 
 // 状态随时间下降 
 setInterval(() => { 
   hunger = Math.max(0, hunger - 2); 
   cleanLevel = Math.max(0, cleanLevel - 1); 
   mood = Math.max(0, mood - 1); 
   updateUI(); 
 }, 3000); 
 
 updateUI(); 
 </script> 
 
 </body> 
 </html>
